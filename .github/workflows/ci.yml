name: React Frontend CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Check Linting
      run: npm run lint
      
    - name: Run Unit Tests
      run: npm run test -- --run

    - name: Build Production Bundle
      run: npm run build
      env:
        # Pass dummy environment vars just for the build process
        VITE_API_URL: "https://haves.co.in/"
        VITE_FIREBASE_API_KEY: "ci-dummy-key"
        VITE_FIREBASE_AUTH_DOMAIN: "ci-dummy.firebaseapp.com"
        VITE_FIREBASE_PROJECT_ID: "ci-dummy"
