name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Cache npm
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}-v1
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install dependencies
        run: npm ci
      - name: Check Linting
        run: npm run lint --if-present
      - name: Run tests
        run: npm test --if-present
      - name: Build
        run: npm run build --if-present
      - name: Persist build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist
 
  deploy-to-ec2:
    needs: build-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build
          path: dist
      - name: Backup current live version
        run: |
          REMOTE_USER="${{ secrets.EC2_USER }}"
          REMOTE_HOST="${{ secrets.EC2_HOST }}"
          ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "
            sudo rm -rf /var/www/html/xmatereact.backup
            if [ -d /var/www/html/xmatereact ]; then
              sudo cp -a /var/www/html/xmatereact /var/www/html/xmatereact.backup
              echo 'Backup created successfully'
            else
              echo 'No existing directory to backup'
            fi
          "
      - name: Rsync build to EC2
        id: deploy
        run: |
          SOURCE_DIR="${GITHUB_WORKSPACE}/dist"
          REMOTE_DIR="/var/www/html/xmatereact"
          REMOTE_USER="${{ secrets.EC2_USER }}"
          REMOTE_HOST="${{ secrets.EC2_HOST }}"
          if [ -d "$SOURCE_DIR" ]; then
            # --no-perms, --no-owner, --no-group: Respect server-side security
            # --exclude: Protect sensitive or unnecessary files
            rsync -avz --delete \
              --no-perms --no-owner --no-group \
              --exclude=".env" \
              --exclude="node_modules" \
              --exclude=".git" \
              -e "ssh -o StrictHostKeyChecking=no" \
              "$SOURCE_DIR/" "$REMOTE_USER@$REMOTE_HOST:$REMOTE_DIR"
          else
            echo "Build directory ($SOURCE_DIR) not found"; exit 1
          fi
      - name: Restart remote service
        run: |
          REMOTE_USER="${{ secrets.EC2_USER }}"
          REMOTE_HOST="${{ secrets.EC2_HOST }}"
          ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "sudo systemctl restart nginx"
      - name: Health check
        id: health_check
        env:
          HEALTH_URL: ${{ secrets.APP_URL }}
        if: env.HEALTH_URL != ''
        run: |
          echo "Performing health checks against ${HEALTH_URL}"
          set -e
          for i in 1 2 3; do
            if curl -fsS "$HEALTH_URL"; then
              echo "Health check passed"
              exit 0
            else
              echo "Health check attempt $i failed"
              sleep 5
            fi
          done
          exit 1
      - name: Automatic Rollback on failure
        if: failure()
        run: |
          REMOTE_USER="${{ secrets.EC2_USER }}"
          REMOTE_HOST="${{ secrets.EC2_HOST }}"
          echo "Deployment failed, attempting rollback to previous version..."
          ssh -o StrictHostKeyChecking=no $REMOTE_USER@$REMOTE_HOST "
            if [ -d /var/www/html/xmatereact.backup ]; then
              # Rollback using rsync to keep ownership/permissions clean
              sudo rsync -avz --delete \
                --no-perms --no-owner --no-group \
                /var/www/html/xmatereact.backup/ /var/www/html/xmatereact
              sudo systemctl restart nginx
              echo 'Rollback complete'
            else
              echo 'No backup found to rollback to'
              exit 1
            fi
          "
